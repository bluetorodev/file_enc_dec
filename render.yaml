# Render Blueprint configuration for FastAPI File Encryption API
services:
  - type: web
    name: file-encryption-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: encryption-key-storage
      mountPath: /data
      sizeGB: 1
